<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Categorías - Bamboo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
        }

        .card {
            background: var(--card);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f3f4f6;
            padding: 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        select {
            padding: 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background: white;
            font-family: inherit;
            width: 100%;
            max-width: 250px;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
            display: none;
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
        }

        .loader {
            text-align: center;
            padding: 2rem;
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Categorización de Pruebas</h1>
            <p>Valida y asigna manualmente las categorías oficiales a cada prueba.</p>
        </header>

        <button class="btn-refresh" onclick="loadTests()">Actualizar Lista</button>

        <div class="card">
            <div id="loader" class="loader">Cargando pruebas...</div>
            <table id="tests-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Prueba</th>
                        <th>Categoría Actual</th>
                        <th>Nueva Categoría</th>
                    </tr>
                </thead>
                <tbody id="tests-body">
                    <!-- Filas dinámicas -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('kokoro_admin_token');
        const categories = [
            "Inteligencia cognitiva",
            "Personalidad",
            "Habilidades",
            "Técnicas",
            "Idiomas",
            "Personalizadas"
        ];

        async function loadTests() {
            const loader = document.getElementById('loader');
            const table = document.getElementById('tests-table');
            const tbody = document.getElementById('tests-body');

            loader.style.display = 'block';
            table.style.display = 'none';
            tbody.innerHTML = '';

            try {
                if (!token) {
                    loader.innerHTML = '<span style="color:red">Error: No se encontró sesión de administrador.</span>';
                    return;
                }
                const response = await fetch('../../../api/admin/catalog/list.php', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (result.status === 'success') {
                    result.data.catalog.forEach(test => {
                        const tr = document.createElement('tr');

                        // Nombre y Key
                        const tdName = document.createElement('td');
                        tdName.innerHTML = `<strong>${test.name}</strong><br><small style="color: grey">${test.key}</small>`;

                        // Categoría Actual
                        const tdCurrent = document.createElement('td');
                        tdCurrent.textContent = test.category || 'Sin categoría';

                        // Selector de Nueva Categoría
                        const tdNew = document.createElement('td');
                        const select = document.createElement('select');

                        // Opción por defecto
                        const defOpt = document.createElement('option');
                        defOpt.value = "";
                        defOpt.textContent = "Seleccionar...";
                        select.appendChild(defOpt);

                        categories.forEach(cat => {
                            const opt = document.createElement('option');
                            opt.value = cat;
                            opt.textContent = cat;
                            if (cat === test.category) opt.selected = true;
                            select.appendChild(opt);
                        });

                        const badge = document.createElement('span');
                        badge.className = 'status-badge status-success';
                        badge.textContent = 'Guardado';

                        select.onchange = () => updateCategory(test.id, select.value, badge, tdCurrent);

                        tdNew.appendChild(select);
                        tdNew.appendChild(badge);

                        tr.appendChild(tdName);
                        tr.appendChild(tdCurrent);
                        tr.appendChild(tdNew);
                        tbody.appendChild(tr);
                    });

                    loader.style.display = 'none';
                    table.style.display = 'table';
                } else {
                    loader.innerHTML = `<div style="color:red; padding:1rem;">Error: ${result.message}</div>`;
                }
            } catch (e) {
                loader.innerHTML = `<div style="color:red; padding:1rem;">Error de conexión: ${e.message}<br><small>Asegúrate de haber subido todos los archivos y estar logueado como admin.</small></div>`;
            }
        }

        async function updateCategory(id, category, badge, tdCurrent) {
            if (!category) return;

            try {
                const response = await fetch('../../../api/admin/catalog/update_category.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id, category })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    tdCurrent.textContent = category;
                    badge.style.display = 'inline-block';
                    setTimeout(() => {
                        badge.style.display = 'none';
                    }, 2000);
                } else {
                    alert("Error: " + result.message);
                }
            } catch (e) {
                alert("Error de conexión: " + e.message);
            }
        }

        window.onload = loadTests;
    </script>
</body>

</html>
