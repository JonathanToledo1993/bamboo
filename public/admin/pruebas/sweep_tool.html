<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramienta de Barrido IA - Bamboo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg);
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .progress-container {
            height: 0.5rem;
            background: #e5e7eb;
            border-radius: 999px;
            margin-bottom: 1rem;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        #log {
            margin-top: 1.5rem;
            text-align: left;
            font-size: 0.875rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
            border-radius: 0.375rem;
            background: #fdfdfd;
            display: none;
        }

        .log-entry {
            margin-bottom: 0.25rem;
        }

        .log-success {
            color: var(--success);
        }

        .log-error {
            color: var(--error);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Barrido de Preguntas con IA</h1>
        <p>Este proceso analizará todas las preguntas y corregirá opciones ilógicas o faltantes.</p>

        <div class="stats">
            <div class="stat-card">
                <div id="total-processed" class="stat-value">0</div>
                <div class="stat-label">Procesadas</div>
            </div>
            <div class="stat-card">
                <div id="total-errors" class="stat-value">0</div>
                <div class="stat-label">Errores</div>
            </div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <button id="start-btn">Iniciar Escaneo Completo</button>

        <div id="log"></div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const logEl = document.getElementById('log');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const processedEl = document.getElementById('total-processed');
        const errorsEl = document.getElementById('total-errors');

        let totalProcessed = 0;
        let totalErrors = 0;
        let isRunning = false;

        async function runBatch() {
            if (isRunning) return;
            isRunning = true;

            const token = localStorage.getItem('kokoro_admin_token');
            if (!token) {
                addLog("Error: No se encontró token de administrador. Inicia sesión.", "error");
                finish(false);
                return;
            }

            startBtn.disabled = true;
            startBtn.textContent = 'Procesando lote...';
            addLog("Solicitando lote de 15 preguntas...");

            try {
                // Llamamos al endpoint relativo con token
                const response = await fetch('../../../api/admin/catalog/ai_rebuild_questions.php?limit=15', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (result.status === 'success') {
                    const count = result.data.rebuilt_count || 0;
                    totalProcessed += count;
                    processedEl.textContent = totalProcessed;

                    if (result.data.errors && result.data.errors.length > 0) {
                        totalErrors += result.data.errors.length;
                        errorsEl.textContent = totalErrors;
                        result.data.errors.forEach(err => addLog(err, 'error'));
                    }

                    addLog(`Lote completado: ${count} saneadas.`, 'success');

                    if (result.data.has_more) {
                        addLog("Lote terminado. Presiona el botón para continuar con otros 15.", 'success');
                        finish(true);
                    } else {
                        addLog("¡Barrido completado! No quedan preguntas pendientes.", 'success');
                        finish(false);
                    }
                } else if (response.status === 429) {
                    addLog("CUOTA EXCEDIDA (429). Google pide un breve descanso de 60s.", 'error');
                    finish(true, "Reintentar Lote (Cuota)");
                } else {
                    addLog("Error en el servidor: " + result.message, 'error');
                    finish(true, "Reintentar Lote");
                }
            } catch (e) {
                addLog("Error de red o conexión: " + e.message, 'error');
                finish(true, "Reintentar Lote");
            }
        }

        function addLog(msg, type = '') {
            logEl.style.display = 'block';
            const div = document.createElement('div');
            div.className = 'log-entry ' + (type ? 'log-' + type : '');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(div);
        }

        function finish(canContinue = false, label = '') {
            isRunning = false;
            startBtn.disabled = !canContinue;
            if (label) {
                startBtn.textContent = label;
            } else {
                startBtn.textContent = canContinue ? 'Continuar con las otras 15 preguntas' : 'Barrido Finalizado';
            }
        }

        startBtn.addEventListener('click', () => {
            progressContainer.style.display = 'block';
            runBatch();
        });
    </script>

</body>

</html>
