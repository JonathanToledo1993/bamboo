<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte | Kokoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: #f1f3f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* PDF viewer area */
        .report-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.10);
            padding: 48px;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }

        /* Gradient bar */
        .score-bar {
            background: linear-gradient(to right, #ef4444, #f97316, #eab308, #84cc16, #22c55e);
            height: 10px;
            border-radius: 99px;
            position: relative;
            margin: 8px 0 4px;
        }

        .score-marker {
            width: 14px;
            height: 14px;
            background: #000;
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            top: -2px;
            transform: translateX(-50%);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        }

        /* Bottom action bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e5e7eb;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        /* Share Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 36px;
            max-width: 460px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        @media print {

            .action-bar,
            .top-bar {
                display: none !important;
            }

            body {
                background: white;
            }

            .report-card {
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar bg-white border-b border-gray-200 h-14 flex items-center px-6 shrink-0">
        <div class="font-bold flex items-center gap-2 text-gray-900">
            <div class="w-7 h-7 bg-[#1e293b] text-white rounded flex items-center justify-center text-sm font-black">K
            </div>
            kokoro
        </div>
        <div class="ml-auto text-xs text-gray-400 font-medium">Reporte generado</div>
    </div>

    <!-- Report Content -->
    <div class="flex-1 overflow-y-auto py-8 px-4 pb-24">
        <div class="report-card fade-in" id="reportCard">

            <!-- Logo and Header -->
            <div class="flex items-center gap-3 mb-10">
                <div
                    class="w-9 h-9 bg-[#1e293b] text-white rounded-lg flex items-center justify-center text-base font-black">
                    K</div>
                <span class="text-xl font-bold text-gray-900">kokoro</span>
            </div>

            <!-- Candidate Info -->
            <div class="grid grid-cols-2 gap-6 mb-8 pb-8 border-b border-gray-100">
                <div>
                    <div id="rCandidateName" class="text-2xl font-bold text-gray-900 mb-1">—</div>
                    <div id="rCargo" class="text-base font-medium text-gray-600 mb-3">—</div>
                    <div id="rEmail" class="text-sm text-blue-600 font-medium">—</div>
                </div>
                <div class="text-right">
                    <div id="rEcId" class="text-xl font-bold text-gray-800 mb-1">—</div>
                    <div id="rFecha" class="text-sm text-gray-500 mb-3">—</div>
                    <div id="rScore" class="text-lg font-bold text-gray-800">—% Puntaje Global</div>
                </div>
            </div>

            <!-- Score Bar -->
            <div class="mb-10">
                <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span>0</span><span>10</span><span>20</span><span>30</span><span>40</span><span>50</span><span>60</span><span>70</span><span>80</span><span>90</span><span>100</span>
                </div>
                <div class="score-bar">
                    <div class="score-marker" id="scoreMarker" style="left: 0%"></div>
                </div>
                <div id="scoreLabel" class="text-xs font-bold text-gray-400 uppercase tracking-widest text-right mt-2">
                    PUNTAJE OBTENIDO</div>
            </div>

            <!-- Evaluation info -->
            <div class="bg-gray-50 rounded-xl p-5 mb-6">
                <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Información de la evaluación
                </div>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div><span class="text-gray-400">Cargo:</span> <span id="rCargoInfo"
                            class="font-medium text-gray-800">—</span></div>
                    <div><span class="text-gray-400">Estado:</span> <span id="rStatus"
                            class="font-medium text-gray-800">—</span></div>
                    <div><span class="text-gray-400">Fecha:</span> <span id="rFechaInfo"
                            class="font-medium text-gray-800">—</span></div>
                    <div><span class="text-gray-400">ID:</span> <span id="rEcIdInfo"
                            class="font-medium text-gray-800 font-mono">—</span></div>
                </div>
            </div>

            <!-- Note -->
            <div class="text-xs text-gray-400 text-center">
                Este reporte fue generado por Kokoro Evaluaciones. Los datos son confidenciales.
            </div>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <span class="text-xs text-gray-400 font-medium">Reporte generado</span>
        <div class="flex items-center gap-3">
            <button onclick="openShareModal()"
                class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-[#1e293b] text-white text-sm font-bold hover:bg-black transition-colors">
                <i class="ph ph-share-network"></i> Compartir
            </button>
            <button onclick="downloadPDF()"
                class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-[#1e293b] text-white text-sm font-bold hover:bg-black transition-colors">
                <i class="ph ph-download-simple"></i> Descargar PDF
            </button>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal-backdrop hidden">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-gray-900">Compartir reporte</h3>
                <button onclick="closeShareModal()"
                    class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-700"><i
                        class="ph ph-x"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nombre del receptor</label>
                    <input id="shareRecipient" type="text" placeholder="Nombre"
                        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black placeholder-gray-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
                    <input id="shareEmail" type="email" placeholder="Email"
                        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black placeholder-gray-400">
                </div>
            </div>
            <button onclick="sendReport()" id="btnSendReport"
                class="mt-6 w-full py-3.5 rounded-xl bg-[#1e293b] text-white text-sm font-bold hover:bg-black transition-colors">
                Enviar reporte
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const ecId = params.get('ecId') || '—';
        const name = decodeURIComponent(params.get('name') || '—');
        const email = decodeURIComponent(params.get('email') || '');
        const cargo = decodeURIComponent(params.get('cargo') || '—');
        const fecha = decodeURIComponent(params.get('fecha') || '—');
        const score = parseFloat(params.get('score') || '0');

        // Fill report
        document.getElementById('rCandidateName').textContent = name;
        document.getElementById('rCargo').textContent = cargo;
        document.getElementById('rEmail').textContent = email;
        document.getElementById('rEcId').textContent = `#${ecId.slice(-5)}`;
        document.getElementById('rFecha').textContent = fecha;
        document.getElementById('rScore').textContent = `${score}% Puntaje Global`;
        document.getElementById('rCargoInfo').textContent = cargo;
        document.getElementById('rStatus').textContent = 'Completado';
        document.getElementById('rFechaInfo').textContent = fecha;
        document.getElementById('rEcIdInfo').textContent = ecId;

        // Score marker
        const pct = Math.min(100, Math.max(0, score));
        document.getElementById('scoreMarker').style.left = pct + '%';

        function openShareModal() {
            document.getElementById('shareModal').classList.remove('hidden');
        }
        function closeShareModal() {
            document.getElementById('shareModal').classList.add('hidden');
        }

        async function sendReport() {
            const recipient = document.getElementById('shareRecipient').value.trim();
            const toEmail = document.getElementById('shareEmail').value.trim();
            if (!recipient || !toEmail) { alert('Nombre y email son obligatorios.'); return; }

            const btn = document.getElementById('btnSendReport');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            // Placeholder — real email sending requires backend
            await new Promise(r => setTimeout(r, 1200));
            alert(`Reporte enviado a ${toEmail} ✓`);
            closeShareModal();
            btn.textContent = 'Enviar reporte';
            btn.disabled = false;
        }

        function downloadPDF() {
            window.print();
        }
    </script>

</body>

</html>
